<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Travel Recommendation | About Us</title>
    <link href="./travel_recomendation.css" rel="stylesheet" />
  </head>
  <body>
    <nav>
      <h1>Travel Recommendation</h1>
      <ul>
        <li><a href="./travel_recommendation.html">Home</a></li>
        <li><a href="./about.html">About Us</a></li>
        <li><a href="./contact.html">Contact Us</a></li>
      </ul>
    </nav>

    <main>
      <div id="intro" style="height: 300px">
        <h1>Contact Us!</h1>
        <p>Get in touch.</p>
        <div style="background-color: #042577; padding: 15px; color: white">
          <form>
            <div>
              <label for="name">Name:</label>
              <input
                type="text"
                name="name"
                id="name"
                placeholder="Enter your name"
              />
            </div>
            <div>
              <label for="name">Email:</label>
              <input
                type="text"
                name="email"
                id="email"
                placeholder="Enter your email"
              />
            </div>
            <div>
              <label for="message">Message:</label>
              <textarea
                type="text"
                name="message"
                id="message"
                placeholder="Enter your message"
              ></textarea>
            </div>
            <div>
              <button id="btnSubmitContact">Submit</button>
            </div>
          </form>
        </div>
      </div>
      <div id="contact"></div>
    </main>
  </body>
</html>
